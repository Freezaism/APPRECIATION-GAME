<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lengkapi kata - Roblox Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --rbx-bg: #111214;          /* Background paling gelap */
            --rbx-panel: #232527;       /* Warna panel utama UI Roblox */
            --rbx-panel-light: #393B3D; /* Panel yang lebih terang */
            --rbx-green: #00B06F;       /* Hijau khas tombol Play Roblox */
            --rbx-green-hover: #008F5A;
            --rbx-text-main: #FFFFFF;
            --rbx-text-sub: #BDBEBE;
            --rbx-wrong: #F63434;
        }

        * { box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background: var(--rbx-bg);
            font-family: 'Montserrat', sans-serif; color: var(--rbx-text-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* --- CONSOLE FRAME (ROBLOX WINDOW) --- */
        #console {
            width: 100%; max-width: 420px; height: 95vh; max-height: 880px;
            background: var(--rbx-panel);
            border-radius: 12px;
            position: relative; display: flex; flex-direction: column;
            padding: 15px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--rbx-panel-light);
        }

        /* --- SCREEN AREA --- */
        #screen-border {
            flex: 1; background: var(--rbx-bg); border-radius: 8px;
            position: relative;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .screen-view {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            padding: 24px; z-index: 10; background: var(--rbx-bg);
            transition: opacity 0.3s ease;
        }
        .hidden { opacity: 0; pointer-events: none; z-index: 0; }

        /* --- START & WIN SCREEN --- */
        .center-content { align-items: center; justify-content: center; text-align: center; }
        
        .photo-slot {
            width: 120px; height: 120px; 
            border-radius: 50%; /* Dibuat bulat seperti Avatar Roblox */
            overflow: hidden; margin-bottom: 20px;
            border: 4px solid var(--rbx-panel-light);
            background: var(--rbx-panel);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 24px; font-weight: 800; color: var(--rbx-text-main); line-height: 1.2; margin-bottom: 8px; }
        p { font-size: 14px; font-weight: 500; color: var(--rbx-text-sub); line-height: 1.5; margin-bottom: 30px; }

        .btn {
            background: var(--rbx-green); color: #fff; border: none;
            padding: 16px 32px; font-family: inherit; font-size: 18px; font-weight: 700;
            cursor: pointer; border-radius: 8px;
            width: 100%; max-width: 250px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn:hover { background: var(--rbx-green-hover); }

        /* --- GAME SCREEN --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; font-weight: 700; color: var(--rbx-text-main); margin-bottom: 20px;
            background: var(--rbx-panel); padding: 12px 16px; border-radius: 8px;
            border: 1px solid var(--rbx-panel-light);
        }

        .clue-box {
            font-size: 16px; font-weight: 700; color: var(--rbx-text-main); text-align: center;
            line-height: 1.6; margin-bottom: 30px; min-height: 35px;
        }

        #word-display {
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 40px;
        }

        .letter-box {
            width: 40px; height: 45px; background: var(--rbx-panel);
            border: 2px solid var(--rbx-panel-light); border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: var(--rbx-text-main); font-weight: 800;
            transition: all 0.2s;
        }
        .letter-box.revealed {
            border-color: var(--rbx-green); background: var(--rbx-green); color: #fff;
            animation: pop 0.3s;
        }
        @keyframes pop { 50% { transform: scale(1.1); } }

        /* --- VIRTUAL KEYBOARD --- */
        #keyboard {
            display: flex; flex-direction: column; gap: 8px;
            margin-top: auto; padding-bottom: 10px; width: 100%;
        }
        
        .key {
            background: var(--rbx-panel); 
            border: 1px solid var(--rbx-panel-light); 
            color: var(--rbx-text-main);
            border-radius: 6px; 
            font-family: inherit; font-weight: 700;
            cursor: pointer; text-align: center;
            min-width: 0; padding: 12px 0; font-size: 14px;
            transition: background-color 0.2s;
        }
        .key:active { transform: scale(0.95); }
        .key.disabled { opacity: 0.5; pointer-events: none; }
        .key.correct { background: var(--rbx-green); border-color: var(--rbx-green); color: #fff; }
        .key.wrong { background: var(--rbx-wrong); border-color: var(--rbx-wrong); color: #fff; }

        /* --- LONG TEXT (DIARY UI) --- */
        #letter-container {
            width: 100%; height: 50%; background: var(--rbx-panel);
            border: 1px solid var(--rbx-panel-light); border-radius: 8px;
            padding: 15px; margin-bottom: 20px; position: relative;
        }
        #letter-scroll {
            width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
            font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 500;
            line-height: 1.6; color: var(--rbx-text-sub); text-align: left;
            word-wrap: break-word; white-space: pre-wrap;
            scrollbar-width: thin; scrollbar-color: var(--rbx-panel-light) var(--rbx-bg);
        }
        #letter-scroll::-webkit-scrollbar { width: 6px; }
        #letter-scroll::-webkit-scrollbar-thumb { background-color: var(--rbx-panel-light); border-radius: 4px; }

    </style>
</head>
<body>

<div id="console">
    <div id="screen-border">

        <div id="start-screen" class="screen-view center-content">
            <div class="photo-slot">
                <img src="https://files.catbox.moe/7v7kbk.png" alt="Nadine">
            </div>
            <h1>LENGKAPI KATA</h1>
            <p>
                APPRECIATION GAME<br>
                FOR MY HONEY BUNNY SWEETIE
            </p>
            <button class="btn" onclick="startGame()">▶ Play</button>
        </div>

        <div id="game-screen" class="screen-view hidden">
            <div class="top-bar">
                <span>Lengkapi Kata</span>
                <span id="level-indicator">Level 1/6</span>
            </div>
            
            <div class="clue-box" id="clue-text"></div>
            
            <div id="word-display"></div>

            <div id="keyboard"></div>
        </div>

        <div id="win-screen" class="screen-view center-content hidden">
            <div class="photo-slot" style="width: 100px; height: 100px; border-color: #00B06F;">
                <img src="https://files.catbox.moe/1y2vs5.png" alt="Kita">
            </div>
            <h1 style="color: #00B06F; font-size: 20px; margin-bottom: 15px;">AKSES DITERIMA! 🔓</h1>
            
            <div id="letter-container">
                <div id="letter-scroll">
                    <div id="typewriter-text"></div>
                </div>
            </div>

            <button class="btn" onclick="location.reload()">Play Again</button>
        </div>

    </div>
</div>

<script>
    // --- ISI SURAT CINTA (PANJANG) ---
    const finalMessage = `HAI HAI HAIII IM BAACCKKKKKKK
    
    YEYYY AKHIRNYAA ADA GAMEE LAGIII, DANN INII GAMEE YANGG KAMU DAPETINN KARENAA SUDAHH BERHASILL MENYELESAIKAN UJIAN DENGAN BAIKKKK...
    
    akhirnyaaa yaaa selesaii jugaaa ujiannyaaaa, wahhh sangatt amat melelahkan sekalii yaaa.. sebelumnyaaa aku mau bilang timakasii sebanyak banyaknyaa karenaa kamuu mauu berjuang bersamaa selama dua tahun kebelakang iniii, wahh jujurr bakal banyak kata kata yang tidak bisa di ungkapkann sihh untukk dua tahun inii, jadii aku akan ngasih kata kataa yangg bisaa ku ungkapkann disinii yaaaa.. wawww darii day 1 belajar bersamaa waktu ituu sampeee kitaa belajar bersama terakhirr rasanyaa cepet bangett yaaa, perasaan baruu kemarinn kitaa bisa belajaarr bareng barrng untuk pertama kalinyaaa, tapii srkarangg menjadii hari terakhirr kitaa ngerjainn ujiann di sdkolaaa huhuuu....
    
    yaa untuk ujiann kali inii sepertinyaa cukupp melelahkann yaaa, darii yang semangatt belajarnyaa udaa terkurasss bangett garabgaraa TKA, teruss puasaaa, dann banyakk faktor lainn yang membuat ujian kali ini berbedaa, tapii kamuu bisaa berhasill mengerjakann semuanyaa dengan baikk, darii matematikaaa sampaii ke sejarahh kamuu sudah mengerjakannyaa dengann baikk, dann aku yakin sekalii kalauy nilaii kamu pasti bagusss, yaa walaupun menurutmuu semester 6btidaa terlalu pentingg tapii yaakk its a long journeyyy. kamuu udaa berjuang kerass bangett bahkann sampai ga boboo lhooo, wawww kerenn sekalii dehhh pokoknyaaa.. aku banggaa bangett sama kamuu sayangg..
    
    yasudaa mungkinn cukup seginii duluu yaaa gamee kali iniii, wawww ak sampai kehabisan kata kataa, intinyaa masihh banyakk hal yangg mungkin tida terungkapkann disiniii cuyy, aku mau mintaa maaff jugaa sebesar besarnyaa mungkin kalau beberapaa bulan terakhir inii aku agaa resek yaa, dari nangisan, lemess muluu, dann bikin kamu bete muluu aku mau mintaa maaff yaaa.. okaydeee mungkinn mulaii harii inii kamuu bisa berliburr dehhh yeyyyy, dannn duaa minggu lagii adaa pengungiman SNBP dann kamuu akan di pastikann lolosss yeyeyeyeyyyyyy aamiin aamiinnnnnn... okaayydeeee goodnighttt yaaa sayangggg, terimakasihh sekalii sudahh mauu berj7angg bersamaaa selamaa iniii, so prouuddd of uuuu kerennn bangett dehhhhh.. tetapp semangatt yaaa fathann disiniu buat nemeninn setiap prosessbkamuu, selaluu berkembang yaa sayanggg.. okaayydee sweet dreamss yaaa  selamaatt sahurr jugakk dan selamat menunaikann ibadau puasaa yaaaa... paipaii paipaiiii, je t'aimeeee bieennn sayanggg💙🩵💙🩵💙🩵💙🩵💙🩵💙🩵💙🩵💙🩵💙`;

    // --- GAME DATA (5 KATA) ---
    // Sedikit memperbaiki typo di array revealed terakhir agar JS tidak error
    const levels = [
        { word: "SAYANG", clue: "Cari kata yang benar", revealed: ['N', 'G'] },
        { word: "KAMU", clue: "Cari kata yang benar", revealed: ['M', 'K'] },
        { word: "HEBAT", clue: "Cari kata yang benar", revealed: ['H', 'T'] },
        { word: "BANGET", clue: "Cari kata yang benar", revealed: ['B', 'G', 'T'] },
        { word: "BISA",  clue: "Cari kata yang benar", revealed: ['S', 'B'] },
        { word: "MENYELESAIKAN",  clue: "Cari kata yang benar", revealed: ['M', 'N', 'Y'] },
        { word: "UJIAN",  clue: "Cari kata yang benar", revealed: ['U', 'N', 'J'] },
        { word: "DENGAN",  clue: "Cari kata yang benar", revealed: ['D', 'N'] },
        { word: "BAIK",  clue: "Cari kata yang benar", revealed: ['B', 'I'] },
        { word: "FATHAN",  clue: "Cari kata yang benar", revealed: ['F'] },
        { word: "BANGGA",  clue: "Cari kata yang benar", revealed: ['G', 'N'] },
        { word: "BANGET",  clue: "Cari kata yang benar", revealed: ['B', 'N'] },
        { word: "SAMA",  clue: "Cari kata yang benar", revealed: ['A'] },
        { word: "KAMU",  clue: "Cari kata yang benar", revealed: ['M'] },
        { word: "ILOVEUSOMUCH",  clue: "Cari kata yang benar", revealed: ['L', 'U','H'] },
        { word: "SAYANG",  clue: "Cari kata yang benar", revealed: ['N', 'Y'] }, 
    ];

    let currentLevelIdx = 0;
    let currentWord = "";
    let guessedLetters = new Set();
    
    // --- AUDIO SYSTEM (Tanpa file mp3) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() { if(!audioCtx) audioCtx = new AudioContext(); }

    function playTone(type) {
        if(!audioCtx) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'levelUp') {
            osc.type = 'square';
            [400, 500, 600].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.frequency.value = freq;
                g.gain.setValueAtTime(0.05, now + i*0.1); g.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.2);
                o.start(now + i*0.1); o.stop(now + i*0.1 + 0.3);
            });
        }
    }

    // --- LOGIC ---
    function startGame() {
        initAudio();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        buildKeyboard();
        loadLevel();
    }

    function loadLevel() {
        if (currentLevelIdx >= levels.length) {
            winGame(); return;
        }

        const lvlData = levels[currentLevelIdx];
        currentWord = lvlData.word;
        guessedLetters.clear();
        
        lvlData.revealed.forEach(char => guessedLetters.add(char));

        document.getElementById('level-indicator').innerText = `Level ${currentLevelIdx + 1}/${levels.length}`;
        document.getElementById('clue-text').innerText = `${lvlData.clue}`;
        
        resetKeyboard();
        renderWord();
    }

    function renderWord() {
        const display = document.getElementById('word-display');
        display.innerHTML = '';
        let isComplete = true;

        for (let i = 0; i < currentWord.length; i++) {
            const char = currentWord[i];
            const box = document.createElement('div');
            box.className = 'letter-box';
            
            if (guessedLetters.has(char)) {
                box.innerText = char;
                box.classList.add('revealed');
            } else {
                box.innerText = ''; 
                isComplete = false;
            }
            display.appendChild(box);
        }

        if (isComplete) {
            setTimeout(() => {
                playTone('levelUp');
                currentLevelIdx++;
                loadLevel();
            }, 1000);
        }
    }

    function buildKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = '';
        
        const qwerty = [
            ["Q","W","E","R","T","Y","U","I","O","P"],
            ["A","S","D","F","G","H","J","K","L"],
            ["Z","X","C","V","B","N","M"]
        ];
        
        qwerty.forEach(row => {
            const rowDiv = document.createElement('div');
            rowDiv.style.display = 'flex';
            rowDiv.style.justifyContent = 'center';
            rowDiv.style.gap = '6px'; /* Jarak tombol keyboard dilebarkan sedikit */
            rowDiv.style.width = '100%';
            
            row.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.id = `key-${letter}`;
                btn.innerText = letter;
                btn.style.flex = '1'; 
                btn.onclick = () => handleGuess(letter);
                rowDiv.appendChild(btn);
            });
            kb.appendChild(rowDiv);
        });
    }

    function resetKeyboard() {
        const keys = document.querySelectorAll('.key');
        keys.forEach(key => {
            key.classList.remove('disabled', 'correct', 'wrong');
        });
        
        const lvlData = levels[currentLevelIdx];
        lvlData.revealed.forEach(char => {
            const btn = document.getElementById(`key-${char}`);
            if(btn) {
                btn.classList.add('disabled', 'correct');
            }
        });
    }

    function handleGuess(letter) {
        if (guessedLetters.has(letter)) return;

        const btn = document.getElementById(`key-${letter}`);
        btn.classList.add('disabled');

        if (currentWord.includes(letter)) {
            guessedLetters.add(letter);
            btn.classList.add('correct');
            playTone('correct');
            renderWord();
        } else {
            btn.classList.add('wrong');
            playTone('wrong');
        }
    }

    function winGame() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        playTone('levelUp');
        typeWriter();
    }

    function typeWriter() {
        const box = document.getElementById('typewriter-text');
        const scrollContainer = document.getElementById('letter-scroll');
        box.innerHTML = '';
        let i = 0;
        
        function type() {
            if(i < finalMessage.length) {
                box.innerText += finalMessage.charAt(i);
                i++;
                scrollContainer.scrollTop = scrollContainer.scrollHeight;
                setTimeout(type, 35);
            }
        }
        setTimeout(type, 500);
    }
</script>
</body>
</html>
